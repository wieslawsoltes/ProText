name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION_FILE: ProText.CI.slnx

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} -c Release --no-restore -warnaserror /p:ContinuousIntegrationBuild=true

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          dotnet test tests/ProText.Tests/ProText.Tests.csproj -c Release --no-build --logger "trx;LogFileName=protext-tests.trx" --results-directory ./artifacts/test-results
          dotnet test tests/ProText.Uno.Tests/ProText.Uno.Tests.csproj -c Release --no-build --logger "trx;LogFileName=protext-uno-tests.trx" --results-directory ./artifacts/test-results
          dotnet test tests/ProText.MAUI.Tests/ProText.MAUI.Tests.csproj -c Release --no-build --logger "trx;LogFileName=protext-maui-tests.trx" --results-directory ./artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/test-results/
          if-no-files-found: ignore
          retention-days: 7

  benchmark-discovery:
    name: Benchmark Discovery
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} -c Release --no-restore -warnaserror /p:ContinuousIntegrationBuild=true

      - name: List ProText benchmarks
        run: dotnet run --no-build -c Release --project benchmarks/ProText.Benchmarks/ProText.Benchmarks.csproj -- --list flat

      - name: List inline benchmarks
        run: dotnet run --no-build -c Release --project benchmarks/ProText.InlineBenchmarks/ProText.InlineBenchmarks.csproj -- --list flat

      - name: List presenter benchmarks
        run: dotnet run --no-build -c Release --project benchmarks/ProText.PresenterBenchmarks/ProText.PresenterBenchmarks.csproj -- --list flat

      - name: List TextBox benchmarks
        run: dotnet run --no-build -c Release --project benchmarks/ProText.TextBoxBenchmarks/ProText.TextBoxBenchmarks.csproj -- --list flat

      - name: List Uno benchmarks
        run: dotnet run --no-build -c Release --project benchmarks/ProText.Uno.Benchmarks/ProText.Uno.Benchmarks.csproj -- --list flat

      - name: List MAUI benchmarks
        run: dotnet run --no-build -c Release --project benchmarks/ProText.MAUI.Benchmarks/ProText.MAUI.Benchmarks.csproj -- --list flat

  pack-preview:
    name: Pack Preview
    runs-on: ubuntu-latest
    needs: [build-test, benchmark-discovery]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} -c Release --no-restore -warnaserror /p:ContinuousIntegrationBuild=true /p:VersionSuffix=ci.${{ github.run_number }}

      - name: Pack ProText packages
        shell: bash
        run: |
          set -euo pipefail
          dotnet pack src/ProText.Core/ProText.Core.csproj -c Release --no-restore -o ./artifacts/packages /p:ContinuousIntegrationBuild=true /p:VersionSuffix=ci.${{ github.run_number }} /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg
          dotnet pack src/ProText.Avalonia/ProText.Avalonia.csproj -c Release --no-restore -o ./artifacts/packages /p:ContinuousIntegrationBuild=true /p:VersionSuffix=ci.${{ github.run_number }} /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg
          dotnet pack src/ProText.Uno/ProText.Uno.csproj -c Release --no-restore -o ./artifacts/packages /p:ContinuousIntegrationBuild=true /p:VersionSuffix=ci.${{ github.run_number }} /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg
          dotnet pack src/ProText.MAUI/ProText.MAUI.csproj -c Release --no-restore -o ./artifacts/packages /p:ContinuousIntegrationBuild=true /p:VersionSuffix=ci.${{ github.run_number }} /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg

      - name: Upload preview packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-preview-packages
          path: artifacts/packages/
          if-no-files-found: error
          retention-days: 7
