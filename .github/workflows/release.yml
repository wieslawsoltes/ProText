name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Package version to build. Defaults to 0.1.0-preview.<run_number> for manual runs.
        required: false
        type: string
      publish_nuget:
        description: Publish packages to NuGet. Tag releases publish automatically; manual runs require this flag.
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION_FILE: ProText.slnx
  TEST_PROJECT: tests/ProText.Tests/ProText.Tests.csproj
  PACKAGE_PROJECT: src/ProText/ProText.csproj

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} -c Release --no-restore -warnaserror /p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT }} -c Release --no-build --logger "trx;LogFileName=protext-tests.trx" --results-directory ./artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results-${{ matrix.os }}
          path: artifacts/test-results/
          if-no-files-found: ignore
          retention-days: 14

  pack-and-publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          elif [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION}"
          else
            version="0.1.0-preview.${GITHUB_RUN_NUMBER}"
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '${version}' is not a valid NuGet package version."
            exit 1
          fi

          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} -c Release --no-restore -warnaserror /p:ContinuousIntegrationBuild=true /p:Version=${{ steps.version.outputs.value }}

      - name: Pack ProText
        run: dotnet pack ${{ env.PACKAGE_PROJECT }} -c Release --no-build -o ./artifacts/packages /p:ContinuousIntegrationBuild=true /p:Version=${{ steps.version.outputs.value }} /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.value }}
          path: artifacts/packages/
          if-no-files-found: error
          retention-days: 14

      - name: Publish to NuGet
        if: ${{ github.ref_type == 'tag' || inputs.publish_nuget }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          if [ -z "${NUGET_API_KEY}" ]; then
            echo "::error::NUGET_API_KEY is not configured for NuGet publishing."
            exit 1
          fi

          shopt -s nullglob
          packages=(artifacts/packages/*.nupkg)
          symbols=(artifacts/packages/*.snupkg)

          for package in "${packages[@]}"; do
            dotnet nuget push "${package}" --api-key "${NUGET_API_KEY}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

          for package in "${symbols[@]}"; do
            dotnet nuget push "${package}" --api-key "${NUGET_API_KEY}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Create GitHub release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          generate_release_notes: true